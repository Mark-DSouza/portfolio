<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff3d9a"/>
      <stop offset="1" stop-color="#3ee8f0"/>
    </linearGradient>
  </defs>

  <!-- terminal window -->
  <rect width="960" height="540" rx="14" fill="#0d0b1e"/>
  <rect x="1" y="1" width="958" height="538" rx="13" fill="none" stroke="#2a2450" stroke-width="2"/>

  <!-- title bar -->
  <path d="M1 14 A13 13 0 0 1 14 1 H946 A13 13 0 0 1 959 14 V44 H1 Z" fill="#161230"/>
  <line x1="1" y1="44" x2="959" y2="44" stroke="#2a2450" stroke-width="1.5"/>
  <circle cx="26" cy="23" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="23" r="6" fill="#febc2e"/>
  <circle cx="66" cy="23" r="6" fill="#28c840"/>
  <text x="480" y="28" text-anchor="middle" fill="#9a94c2" font-size="13">claude — orchestrating kanban-board build</text>

  <!-- header -->
  <text x="40" y="86" fill="#e8e6f5" font-size="16"><tspan fill="#3ee8f0">❯</tspan> <tspan font-weight="700">7 background tasks running</tspan> <tspan fill="#9a94c2">· main thread free</tspan></text>

  <!-- task rows: name, bar track, fill, %, status -->
  <g font-size="13">
    <!-- row 1 -->
    <text x="40" y="136" fill="#e8e6f5">db-schema</text>
    <rect x="230" y="124" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="124" width="480" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="136" fill="#3ee8f0">100%</text>
    <text x="800" y="136" fill="#28c840">✓ done</text>
    <!-- row 2 -->
    <text x="40" y="184" fill="#e8e6f5">auth-flow</text>
    <rect x="230" y="172" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="172" width="418" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="184" fill="#3ee8f0">87%</text>
    <text x="800" y="184" fill="#9a94c2">writing…</text>
    <!-- row 3 -->
    <text x="40" y="232" fill="#e8e6f5">board-ui</text>
    <rect x="230" y="220" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="220" width="346" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="232" fill="#3ee8f0">72%</text>
    <text x="800" y="232" fill="#9a94c2">writing…</text>
    <!-- row 4 -->
    <text x="40" y="280" fill="#e8e6f5">drag-drop</text>
    <rect x="230" y="268" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="268" width="288" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="280" fill="#3ee8f0">60%</text>
    <text x="800" y="280" fill="#9a94c2">writing…</text>
    <!-- row 5 -->
    <text x="40" y="328" fill="#e8e6f5">api-routes</text>
    <rect x="230" y="316" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="316" width="211" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="328" fill="#3ee8f0">44%</text>
    <text x="800" y="328" fill="#9a94c2">writing…</text>
    <!-- row 6 -->
    <text x="40" y="376" fill="#e8e6f5">seed-data</text>
    <rect x="230" y="364" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="364" width="130" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="376" fill="#3ee8f0">27%</text>
    <text x="800" y="376" fill="#9a94c2">writing…</text>
    <!-- row 7 -->
    <text x="40" y="424" fill="#e8e6f5">code-review</text>
    <rect x="230" y="412" width="480" height="14" rx="7" fill="#161230" stroke="#2a2450"/>
    <rect x="230" y="412" width="38" height="14" rx="7" fill="url(#bar)"/>
    <text x="730" y="424" fill="#3ee8f0">8%</text>
    <text x="800" y="424" fill="#ff3d9a">queued</text>
  </g>

  <!-- footer hint -->
  <line x1="1" y1="466" x2="959" y2="466" stroke="#2a2450" stroke-width="1.5"/>
  <text x="40" y="502" fill="#5c5590" font-size="12">@agent to delegate · ctrl+b to background · illustration — not a real screenshot</text>
</svg>
