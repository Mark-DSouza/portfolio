<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="ui-monospace, 'Cascadia Mono', Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="meterHot" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ff3d9a"/>
      <stop offset="1" stop-color="#ff7ab8"/>
    </linearGradient>
    <linearGradient id="meterCool" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3ee8f0"/>
      <stop offset="1" stop-color="#9ff4f8"/>
    </linearGradient>
  </defs>

  <rect width="960" height="520" rx="14" fill="#0d0b1e"/>
  <rect x="1" y="1" width="958" height="518" rx="13" fill="none" stroke="#2a2450" stroke-width="2"/>

  <!-- ============ LEFT: single bloated thread ============ -->
  <text x="240" y="46" text-anchor="middle" fill="#e8e6f5" font-size="17" font-weight="700">ONE THREAD DOES EVERYTHING</text>

  <!-- context window column -->
  <rect x="150" y="70" width="180" height="360" rx="10" fill="#161230" stroke="#2a2450" stroke-width="2"/>

  <!-- dropped messages drifting out the top -->
  <g opacity="0.55">
    <rect x="163" y="84" width="154" height="26" rx="6" fill="none" stroke="#ff3d9a" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="240" y="101" text-anchor="middle" fill="#ff3d9a" font-size="11">requirements ✕</text>
  </g>
  <g opacity="0.4">
    <rect x="163" y="118" width="154" height="26" rx="6" fill="none" stroke="#ff3d9a" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="240" y="135" text-anchor="middle" fill="#ff3d9a" font-size="11">early decisions ✕</text>
  </g>
  <text x="240" y="164" text-anchor="middle" fill="#9a94c2" font-size="10" opacity="0.8">dropped to make room</text>

  <!-- surviving messages, packed tight -->
  <g fill="#221c44" stroke="#3a3268" stroke-width="1">
    <rect x="163" y="176" width="154" height="24" rx="6"/>
    <rect x="163" y="206" width="154" height="24" rx="6"/>
    <rect x="163" y="236" width="154" height="24" rx="6"/>
    <rect x="163" y="266" width="154" height="24" rx="6"/>
    <rect x="163" y="296" width="154" height="24" rx="6"/>
    <rect x="163" y="326" width="154" height="24" rx="6"/>
    <rect x="163" y="356" width="154" height="24" rx="6"/>
    <rect x="163" y="386" width="154" height="30" rx="6"/>
  </g>
  <g fill="#9a94c2" font-size="11" text-anchor="middle">
    <text x="240" y="192">research</text>
    <text x="240" y="222">planning</text>
    <text x="240" y="252">coding</text>
    <text x="240" y="282">debugging</text>
    <text x="240" y="312">more coding</text>
    <text x="240" y="342">reviewing</text>
    <text x="240" y="372">fixing tests</text>
    <text x="240" y="406">…compacting…</text>
  </g>

  <!-- fill meter -->
  <rect x="352" y="70" width="26" height="360" rx="8" fill="#161230" stroke="#2a2450" stroke-width="2"/>
  <rect x="356" y="78" width="18" height="348" rx="6" fill="url(#meterHot)"/>
  <text x="365" y="452" text-anchor="middle" fill="#ff3d9a" font-size="12" font-weight="700">98%</text>
  <text x="240" y="470" text-anchor="middle" fill="#9a94c2" font-size="12">context spent — project goals gone</text>

  <!-- divider -->
  <line x1="480" y1="46" x2="480" y2="474" stroke="#2a2450" stroke-width="2" stroke-dasharray="3 7"/>

  <!-- ============ RIGHT: orchestrator + sub-agents ============ -->
  <text x="720" y="46" text-anchor="middle" fill="#e8e6f5" font-size="17" font-weight="700">ORCHESTRATOR + SUB-AGENTS</text>

  <!-- lean main thread -->
  <rect x="540" y="120" width="150" height="260" rx="10" fill="#161230" stroke="#3ee8f0" stroke-width="2"/>
  <text x="615" y="146" text-anchor="middle" fill="#3ee8f0" font-size="12" font-weight="700">main thread</text>
  <g fill="#221c44" stroke="#3a3268" stroke-width="1">
    <rect x="552" y="160" width="126" height="24" rx="6"/>
    <rect x="552" y="190" width="126" height="24" rx="6"/>
    <rect x="552" y="220" width="126" height="24" rx="6"/>
  </g>
  <g fill="#9a94c2" font-size="11" text-anchor="middle">
    <text x="615" y="176">requirements ✓</text>
    <text x="615" y="206">decisions ✓</text>
    <text x="615" y="236">delegation</text>
  </g>
  <!-- roomy empty space -->
  <rect x="552" y="250" width="126" height="118" rx="6" fill="none" stroke="#2a2450" stroke-width="1.5" stroke-dasharray="4 5"/>
  <text x="615" y="313" text-anchor="middle" fill="#5c5590" font-size="11">room to think</text>

  <!-- main meter -->
  <rect x="540" y="396" width="150" height="14" rx="7" fill="#161230" stroke="#2a2450" stroke-width="1.5"/>
  <rect x="543" y="399" width="50" height="8" rx="4" fill="url(#meterCool)"/>
  <text x="615" y="432" text-anchor="middle" fill="#3ee8f0" font-size="12" font-weight="700">34% used</text>

  <!-- connectors -->
  <g stroke="#5c5590" stroke-width="1.5" fill="none">
    <path d="M690 180 C 730 180, 730 130, 762 130"/>
    <path d="M690 250 C 730 250, 730 250, 762 250"/>
    <path d="M690 320 C 730 320, 730 370, 762 370"/>
  </g>

  <!-- sub-agent bubbles: each with its own tiny context meter -->
  <g>
    <rect x="762" y="96" width="158" height="68" rx="12" fill="#161230" stroke="#ff3d9a" stroke-width="2"/>
    <text x="841" y="122" text-anchor="middle" fill="#ff3d9a" font-size="12" font-weight="700">explore agent</text>
    <rect x="778" y="134" width="126" height="10" rx="5" fill="#221c44"/>
    <rect x="778" y="134" width="88" height="10" rx="5" fill="url(#meterHot)" opacity="0.85"/>
    <text x="841" y="158" text-anchor="middle" fill="#5c5590" font-size="9">own context window</text>
  </g>
  <g>
    <rect x="762" y="216" width="158" height="68" rx="12" fill="#161230" stroke="#ff3d9a" stroke-width="2"/>
    <text x="841" y="242" text-anchor="middle" fill="#ff3d9a" font-size="12" font-weight="700">coding agent</text>
    <rect x="778" y="254" width="126" height="10" rx="5" fill="#221c44"/>
    <rect x="778" y="254" width="70" height="10" rx="5" fill="url(#meterHot)" opacity="0.85"/>
    <text x="841" y="278" text-anchor="middle" fill="#5c5590" font-size="9">own context window</text>
  </g>
  <g>
    <rect x="762" y="336" width="158" height="68" rx="12" fill="#161230" stroke="#ff3d9a" stroke-width="2"/>
    <text x="841" y="362" text-anchor="middle" fill="#ff3d9a" font-size="12" font-weight="700">review agent</text>
    <rect x="778" y="374" width="126" height="10" rx="5" fill="#221c44"/>
    <rect x="778" y="374" width="48" height="10" rx="5" fill="url(#meterHot)" opacity="0.85"/>
    <text x="841" y="398" text-anchor="middle" fill="#5c5590" font-size="9">own context window</text>
  </g>

  <text x="720" y="470" text-anchor="middle" fill="#9a94c2" font-size="12">heavy lifting happens off-thread</text>
</svg>
